# Netlify config for the HYROX Prep PWA (static site, no build step)
[build]
  publish = "."

# Never let the CDN cache the service worker or the HTML shell, so app
# updates reach installed devices immediately on the next launch.
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json"
